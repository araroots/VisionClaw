name: Build Debug APK

on:
  push:
    branches: [main]
    paths:
      - "samples/CameraAccessAndroid/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: samples/CameraAccessAndroid
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create Secrets.kt from template
        run: |
          cp app/src/main/java/com/meta/wearable/dat/externalsampleapps/cameraaccess/Secrets.kt.example \
             app/src/main/java/com/meta/wearable/dat/externalsampleapps/cameraaccess/Secrets.kt

      - name: Build debug APK
        run: ./gradlew assembleDebug
        env:
          GITHUB_TOKEN: ${{ secrets.DAT_SDK_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: samples/CameraAccessAndroid/app/build/outputs/apk/debug/app-debug.apk
